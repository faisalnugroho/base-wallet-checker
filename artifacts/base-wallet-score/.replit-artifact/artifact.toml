kind = "web"
previewPath = "/"
title = "Base Wallet Score"
version = "1.0.0"
id = "artifacts/base-wallet-score"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19449

[services.development]
run = "pnpm --filter @workspace/base-wallet-score run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/base-wallet-score", "run", "build" ]
publicDir = "artifacts/base-wallet-score/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19449"
BASE_PATH = "/"
